<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review</title>
</head>
<body>
    <div class="item_detail">
        <a href="{% url 'product_detail' order_item.product.id %}">
            <p>{{ order_item.product.product_name }}</p>
            <img src="{{ order_item.product.product_image.url }}" width="100">
        </a>
    </div>
    <div class="review_form">
        <form action="{% url 'review' order_item.id %}" method="POST" enctype="multipart/form-data" >
            {% csrf_token %}
            <fieldset>
                <legend>Ratings & Reviews</legend>

                <div class="rate">
                    <p>Rate this product</p>
                    <input type="hidden" name="rating" id="rating" required>
                    <span onclick="setRating(1)" style="cursor: pointer;">☆</span>
                    <span onclick="setRating(2)" style="cursor: pointer;">☆</span>
                    <span onclick="setRating(3)" style="cursor: pointer;">☆</span>
                    <span onclick="setRating(4)" style="cursor: pointer;">☆</span>
                    <span onclick="setRating(5)" style="cursor: pointer;">☆</span>
                </div>
                <div class="review">
                    <p>Review this product</p>
                    <textarea name="description" placeholder="Description" rows="6" required></textarea>
                    <input type="file" name="image" id="image" accept="image/*" multiple>
                    <label for="image">📷</label>
                    <button type="submit">Submit</button>
                </div>

            </fieldset>
        </form>
    </div>

    <script>
        function setRating(value){
            value = parseInt(value);
            document.getElementById('rating').value = value;
            const stars = document.querySelectorAll('.rate span');
            stars.forEach((star , index) => {
                if (index < value) {
                    star.textContent = '⭐';
                }else {
                    star.textContent = '☆';
                }
            });
        }
    </script>

</body>
</html>
